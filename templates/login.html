{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | Academy Management System</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <div class="login-container">
        
        <div class="school-branding">
            <div class="school-logo-placeholder">A</div>
            <h2>Academy Portal</h2>
            <p>Please log in to your student or faculty account.</p>
        </div>

        {% if messages %}
            <div class="message-container">
                {% for message in messages %}
                    <div class="alert-error">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off">
            </div>

            <button type="submit" class="submit-btn">Secure Login</button>
        </form>
        
    </div>

</body>
</html>
